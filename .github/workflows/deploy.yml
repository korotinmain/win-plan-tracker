name: CI / Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ── Build & Test ────────────────────────────────────────────────────────────
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      # environment.ts and environment.prod.ts are gitignored (contain Firebase
      # client config). Write them from a repository secret before building.
      - name: Write environment files
        run: |
          echo "${{ secrets.FIREBASE_ENV_PROD }}" > src/environments/environment.prod.ts
          cp src/environments/environment.prod.ts src/environments/environment.ts

      - name: Build Angular app
        run: npm run build

      - name: Install Chrome (for Karma tests)
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/google.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -qq && sudo apt-get install -y google-chrome-stable

      - name: Run unit tests (headless)
        run: npm run test -- --watch=false --browsers=ChromeHeadlessCI
        env:
          CHROME_FLAGS: "--no-sandbox --disable-gpu --disable-dev-shm-usage"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/win-plan-tracker
          retention-days: 1

  # ── Deploy (main branch only) ────────────────────────────────────────────────
  deploy:
    name: Deploy to Firebase
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      # Write Firebase client config files (gitignored) from repository secret
      - name: Write environment files
        run: |
          echo "${{ secrets.FIREBASE_ENV_PROD }}" > src/environments/environment.prod.ts
          cp src/environments/environment.prod.ts src/environments/environment.ts

      - name: Build Angular app
        run: npm run build

      # Decode the service account JSON stored as a GitHub secret and write it
      # to a file so the Firebase CLI can use it for authentication.
      - name: Write Firebase service account key
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_WIN_PLAN_TRACKER }}' > /tmp/sa.json

      - name: Deploy everything to Firebase
        run: |
          npx firebase deploy \
            --project win-plan-tracker \
            --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
