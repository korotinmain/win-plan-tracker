<div class="ctd-wrap">
  <!-- Header -->
  <div class="ctd-header">
    <div class="ctd-header-icon">
      <mat-icon>{{ selectedIcon() }}</mat-icon>
    </div>
    <div class="ctd-header-text">
      <h2 class="ctd-title">New Team</h2>
      <p class="ctd-sub">Name your team and pick an icon</p>
    </div>
    <button class="ctd-close" (click)="dismiss()" type="button">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <!-- Body -->
  <div class="ctd-body">
    <label class="ctd-label">Team Name</label>
    <input
      class="ctd-input"
      type="text"
      placeholder="e.g. Frontend Squad"
      [(ngModel)]="name"
      maxlength="40"
      (keyup.enter)="submit()"
      autofocus
    />

    <div class="ctd-icon-section-header">
      <label class="ctd-label">Icon</label>
      <div class="ctd-icon-search-wrap">
        <mat-icon class="ctd-search-icon">search</mat-icon>
        <input
          class="ctd-icon-search"
          type="text"
          placeholder="Search icons…"
          [ngModel]="iconSearch()"
          (ngModelChange)="iconSearch.set($event)"
        />
        <button
          *ngIf="iconSearch()"
          class="ctd-search-clear"
          (click)="iconSearch.set('')"
          type="button"
        >
          <mat-icon>close</mat-icon>
        </button>
      </div>
    </div>

    <div class="ctd-icon-grid" *ngIf="filteredIcons().length > 0">
      <button
        *ngFor="let icon of filteredIcons()"
        class="icon-tile"
        [class.selected]="selectedIcon() === icon"
        [class.taken]="isIconTaken(icon)"
        (click)="select(icon)"
        type="button"
        matRipple
        [matRippleDisabled]="isIconTaken(icon)"
        [matTooltip]="
          isIconTaken(icon) ? 'Already used by another team' : iconLabel(icon)
        "
        matTooltipShowDelay="600"
      >
        <mat-icon>{{ icon }}</mat-icon>
        <span *ngIf="isIconTaken(icon)" class="ctd-icon-lock">
          <mat-icon>lock</mat-icon>
        </span>
      </button>
    </div>

    <div *ngIf="filteredIcons().length === 0" class="ctd-no-icons">
      <mat-icon>search_off</mat-icon>
      <span>No icons match "{{ iconSearch() }}"</span>
    </div>
  </div>

  <!-- Footer -->
  <div class="ctd-footer">
    <button class="btn-cancel" (click)="dismiss()" type="button">Cancel</button>
    <button
      class="btn-submit"
      (click)="submit()"
      [disabled]="!name.trim()"
      type="button"
    >
      <mat-icon>add</mat-icon>
      Create Team
    </button>
  </div>
</div>
