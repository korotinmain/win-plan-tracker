<div class="my-vac-page">
  <div class="page-header">
    <mat-icon class="page-icon">beach_access</mat-icon>
    <div>
      <h1 class="page-title">My Requests</h1>
      <p class="page-sub">Your vacation and leave requests</p>
    </div>
  </div>

  <div *ngIf="loading()" class="loading-box">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <div *ngIf="!loading() && requests().length === 0" class="empty-state">
    <mat-icon>event_busy</mat-icon>
    <p>No requests yet.</p>
  </div>

  <div class="requests-list" *ngIf="!loading() && requests().length > 0">
    <div class="request-card" *ngFor="let r of requests()">
      <div class="request-dates">
        <mat-icon class="req-icon">date_range</mat-icon>
        <span>{{ r.startDate }} – {{ r.endDate }}</span>
      </div>
      <div class="request-note" *ngIf="r.note">{{ r.note }}</div>
      <span
        class="status-badge"
        [style.background]="statusColor(r.status)"
        [style.color]="statusTextColor(r.status)"
        >{{ r.status }}</span
      >
    </div>
  </div>
</div>
